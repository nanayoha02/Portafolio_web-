<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Admin | Yohana Franceschi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #070b14;
            --bg-card: #111827;

            --primary: #ff8fab;
            --secondary: #ffb3c1;

            --text-white: #ffffff;
            --text-dim: #94a3b8;

            --accent-gradient: linear-gradient(135deg, #ff8fab, #ffb3c1);
        }

        body.login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, rgba(255, 143, 171, 0.08), transparent),
                        radial-gradient(circle at bottom left, rgba(255, 179, 193, 0.08), transparent),
                        var(--bg-dark);
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .login-container {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeUp 0.8s ease;
        }

        .login-container h2 {
            color: white;
            margin-bottom: 20px;
            font-weight: 800;
            font-size: 2rem;
        }

        .login-container h2 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-container input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: white;
            transition: 0.3s;
        }

        .login-container input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 10px rgba(255, 143, 171, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.3);
        }

        .back-link {
            margin-top: 20px;
            display: block;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="login-page">

    <div class="login-container">
        <h2>Admin<span>.</span></h2>

        <form id="login-form">
            <input type="email" id="email" placeholder="Correo" required>
            <input type="password" id="password" placeholder="Contraseña" required>

            <button type="submit" class="btn-login">
                Entrar al Dashboard
            </button>
        </form>

        <a href="index.html" class="back-link">
            ← Volver al sitio
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
