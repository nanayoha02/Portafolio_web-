<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin | Yohana Franceschi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --bg: #C5B49E;
      --bg-card: #F4EFEA;
      --primary: #580C14;
      --primary-light: #7A1E2A;
      --text-primary: #2C1810;
      --text-secondary: #6B5B4E;
      --text-muted: #9B8B7A;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    .login-container {
      background: var(--bg-card);
      padding: 48px 40px;
      border-radius: 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(44, 24, 16, 0.12);
      animation: fadeUp 0.6s ease;
    }

    .login-container h2 {
      font-family: var(--font-serif);
      color: var(--text-primary);
      font-weight: 700;
      font-size: 2rem;
      margin-bottom: 4px;
    }

    .login-container h2 span { color: var(--primary); }

    .login-container p {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 0.9rem;
    }

    .login-container input {
      width: 100%;
      padding: 14px 18px;
      margin: 8px 0;
      background: rgba(88, 12, 20, 0.04);
      border: 1px solid rgba(88, 12, 20, 0.1);
      border-radius: 14px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .login-container input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(88, 12, 20, 0.08);
    }

    .login-container input::placeholder { color: var(--text-muted); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88, 12, 20, 0.2);
    }

    .back-link {
      margin-top: 24px;
      display: inline-block;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .back-link:hover { color: var(--primary); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Admin<span>.</span></h2>
    <p>Acceso al panel de administraci&oacute;n</p>
    <form id="login-form">
      <input type="email" id="email" placeholder="Correo electr&oacute;nico" required autocomplete="email">
      <input type="password" id="password" placeholder="Contrase&ntilde;a" required autocomplete="current-password">
      <button type="submit" class="btn-login">Entrar al Dashboard</button>
    </form>
    <a href="index.html" class="back-link">&larr; Volver al sitio</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
