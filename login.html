<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Admin | Yohana Franceschi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --bg-dark: #1a1a2e;
      --bg-card: #232340;
      --primary: #ffb6c1;
      --secondary: #c8a8e9;
      --text-white: #f8f9ff;
      --text-dim: #c8c8e0;
      --accent-gradient: linear-gradient(135deg, #ffb6c1, #c8a8e9);
      --font-display: 'Nunito', sans-serif;
      --font-body: 'Quicksand', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top right, rgba(255, 182, 193, 0.08), transparent),
        radial-gradient(circle at bottom left, rgba(200, 168, 233, 0.08), transparent),
        var(--bg-dark);
      margin: 0;
      font-family: var(--font-body);
    }

    .login-container {
      background: rgba(35, 35, 64, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 44px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: fadeUp 0.8s ease;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-container h2 {
      font-family: var(--font-display);
      color: var(--text-white);
      margin-bottom: 8px;
      font-weight: 900;
      font-size: 2.2rem;
    }

    .login-container h2 span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-container p {
      color: var(--text-dim);
      margin-bottom: 28px;
      font-size: 0.9rem;
    }

    .login-container input {
      width: 100%;
      padding: 14px 18px;
      margin: 8px 0;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: var(--text-white);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .login-container input::placeholder {
      color: rgba(200, 200, 224, 0.5);
    }

    .login-container input:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 182, 193, 0.15);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent-gradient);
      color: var(--bg-dark);
      border: none;
      border-radius: 14px;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(255, 182, 193, 0.3);
    }

    .back-link {
      margin-top: 24px;
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--primary);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Admin<span>.</span></h2>
    <p>Acceso al panel de administraci&oacute;n</p>

    <form id="login-form">
      <input type="email" id="email" placeholder="Correo electr&oacute;nico" required autocomplete="email">
      <input type="password" id="password" placeholder="Contrase&ntilde;a" required autocomplete="current-password">
      <button type="submit" class="btn-login">Entrar al Dashboard</button>
    </form>

    <a href="index.html" class="back-link">&larr; Volver al sitio</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
