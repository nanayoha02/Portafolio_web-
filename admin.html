<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Dashboard</title>
    
    <!-- PROTECCIÓN ADMIN 🔐 -->
    <script>
    window.addEventListener("supabaseReady", async () => {
        const { data } = await _supabase.auth.getUser();

        if (!data.user) {
            window.location.href = "login.html";
        }
    });
    </script>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Scripts -->
    <script src="js/main.js" defer></script>
    <script src="js/script.js" defer></script>
    <script src="js/auth.js" defer></script>

</head>

<body class="admin-body">

    <!-- HEADER -->
    <header class="admin-header">
        <div class="header-container">
            <h1>Dashboard<span>.</span></h1>
            <button onclick="logout()" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Salir
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="admin-main">

        <!-- TABS -->
        <div class="admin-nav-tabs">
            <button onclick="showTab('tab-proyectos', event)" class="tab-btn active">
                <i class="fas fa-project-diagram"></i> Proyectos
            </button>
            <button onclick="showTab('tab-habilidades', event)" class="tab-btn">
                <i class="fas fa-chart-pie"></i> Habilidades
            </button>
            <button onclick="showTab('tab-contacto', event)" class="tab-btn">
                <i class="fas fa-address-book"></i> Contacto
            </button>
            <button onclick="showTab('tab-sobre', event)" class="tab-btn">
                <i class="fas fa-user"></i> Sobre Mí
            </button>
        </div>

        <!-- PROYECTOS -->
        <section id="tab-proyectos" class="tab-content active">
            <div class="admin-grid">

                <div class="admin-card">
                    <h3>Gestionar Proyecto</h3>

                    <form id="form-proyectos">
                        <input type="hidden" id="p-id">

                        <div class="input-group">
                            <input type="text" id="p-titulo" placeholder="Título del Proyecto" required>
                        </div>

                        <div class="input-group">
                            <textarea id="p-desc" placeholder="Descripción breve"></textarea>
                        </div>

                        <div class="input-group">
                            <input type="text" id="p-tech" placeholder="Tecnologías">
                        </div>

                        <div class="admin-grid-inputs">
                            <input type="text" id="p-repo" placeholder="GitHub">
                            <input type="text" id="p-live" placeholder="Sitio Web">
                        </div>

                        <div class="input-group">
                            <input type="file" id="p-img-file">
                        </div>

                        <select id="p-etapa">
                            <option value="25">En Desarrollo</option>
                            <option value="60">Beta</option>
                            <option value="100">Finalizado</option>
                        </select>

                        <button class="btn-primary">Guardar</button>
                    </form>
                </div>

                <div class="admin-card">
                    <h3>Lista</h3>
                    <div id="lista-proyectos"></div>
                </div>

            </div>
        </section>

        <!-- HABILIDADES -->
        <section id="tab-habilidades" class="tab-content">
            <div class="admin-grid">

                <div class="admin-card">
                    <h3>Nueva Habilidad</h3>

                    <form id="form-habilidad">
                        <input id="nombre" placeholder="Nombre">
                        <input id="porcentaje" type="number" placeholder="Porcentaje">

                        <select id="categoria">
                            <option>Lenguajes</option>
                            <option>Bases de Datos</option>
                            <option>Herramientas</option>
                            <option>Metodologías</option>
                        </select>

                        <input id="icono" placeholder="Icono">

                        <button class="btn-primary">Guardar</button>
                    </form>
                </div>

                <div class="admin-card">
                    <h3>Lista</h3>
                    <div id="lista-habilidades"></div>
                </div>

            </div>
        </section>

        <!-- CONTACTO -->
        <section id="tab-contacto" class="tab-content">
            <div class="admin-card">

                <form id="form-contacto">
                    <input type="email" id="c-email" placeholder="Email">
                    <input type="text" id="c-linkedin" placeholder="LinkedIn">
                    <input type="text" id="c-github" placeholder="GitHub">

                    <button class="btn-primary">Guardar</button>
                </form>

            </div>
        </section>

        <!-- SOBRE MI -->
        <section id="tab-sobre" class="tab-content">
            <div class="admin-card">

                <h3>Sobre Mí</h3>

                <form id="form-sobre">

                    <input type="text" id="about-titulo-input" placeholder="Título">

                    <textarea id="about-desc1-input" placeholder="Descripción 1"></textarea>
                    <textarea id="about-desc2-input" placeholder="Descripción 2"></textarea>

                    <input type="file" id="about-img-file">

                    <input type="text" id="about-lista-input" placeholder="Lista (coma)">

                    <button class="btn-primary">Guardar</button>

                </form>

            </div>
        </section>

    </main>

</body>
</html>
