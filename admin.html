<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin | Yohana Franceschi</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body class="admin-body">

  <header class="admin-header">
    <div class="header-container">
      <h1>✨ Dashboard<span>.</span></h1>
      <div class="admin-user-info">
        <span id="user-email">Admin</span>
        <button onclick="logout()" class="btn-logout">
          <i class="fas fa-sign-out-alt"></i> Salir
        </button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <nav class="admin-nav-tabs">
      <button onclick="showTab('tab-proyectos', event)" class="tab-btn active">
        <i class="fas fa-project-diagram"></i> Proyectos
      </button>
      <button onclick="showTab('tab-habilidades', event)" class="tab-btn">
        <i class="fas fa-bolt"></i> Habilidades
      </button>
      <button onclick="showTab('tab-contacto', event)" class="tab-btn">
        <i class="fas fa-address-book"></i> Contacto
      </button>
            <button onclick="showTab('tab-testimonios', event)" class="tab-btn">
                <i class="fas fa-star"></i> Testimonios
            </button>
            <button onclick="showTab('tab-sobre', event)" class="tab-btn">
                <i class="fas fa-user-circle"></i> Sobre Mí
            </button>
    </nav>

    <section id="tab-proyectos" class="tab-content active">
      <div class="admin-grid">
        <div class="admin-card">
          <div class="card-header">
            <h3><i class="fas fa-edit"></i> Gestionar Proyecto</h3>
          </div>
          <form id="form-proyectos">
            <input type="hidden" id="p-id" data-editing="false" data-img-url="">
            <div class="input-group">
              <input type="text" id="p-titulo" placeholder="Título del Proyecto" required>
            </div>
            <div class="input-group">
              <textarea id="p-desc" placeholder="Descripción breve" rows="3"></textarea>
            </div>
            <div class="input-group">
              <input type="text" id="p-tech" placeholder="Tecnologías (Ej: React, Supabase)">
            </div>
            <div class="admin-grid-inputs">
              <input type="text" id="p-repo" placeholder="URL GitHub">
              <input type="text" id="p-live" placeholder="URL Sitio Web">
            </div>
            <div class="input-group">
              <label for="p-img-file">Imagen del Proyecto</label>
              <input type="file" id="p-img-file" class="file-input">
            </div>
            <div class="input-group">
              <select id="p-etapa">
                <option value="En Desarrollo">En Desarrollo</option>
                <option value="Beta">Versión Beta</option>
                <option value="Finalizado">Finalizado</option>
              </select>
            </div>
            <button type="submit" class="btn-primary w-100">Guardar Proyecto</button>
          </form>
        </div>

        <div class="admin-card">
          <div class="card-header">
            <h3><i class="fas fa-list"></i> Lista de Proyectos</h3>
          </div>
          <div id="lista-proyectos" class="admin-list-container"></div>
        </div>
      </div>
    </section>

    <section id="tab-habilidades" class="tab-content">
      <div class="admin-grid">
        <div class="admin-card">
          <div class="card-header">
            <h3><i class="fas fa-plus-circle"></i> Nueva Habilidad</h3>
          </div>
          <form id="form-habilidad">
            <div class="input-group">
              <input id="nombre" type="text" placeholder="Nombre (Ej: Python)" required>
            </div>
            <div class="input-group">
              <select id="nivel-habilidad">
                <option value="Junior">Junior</option>
                <option value="Intermedio">Intermedio</option>
                <option value="Avanzado">Avanzado</option>
                <option value="Experto">Experto</option>
              </select>
            </div>
            <div class="input-group">
              <select id="categoria">
                <option>Lenguajes</option>
                <option>Bases de Datos</option>
                <option>Herramientas</option>
                <option>Metodologías</option>
              </select>
            </div>
            <div class="input-group">
              <input id="icono" type="text" placeholder="Icono (Ej: fab fa-python)">
              <small>Usa clases de <a href="https://fontawesome.com/icons" target="_blank">FontAwesome</a></small>
            </div>
            <button type="submit" class="btn-primary w-100">Añadir Habilidad</button>
          </form>
        </div>

        <div class="admin-card">
          <div class="card-header">
            <h3><i class="fas fa-th"></i> Tus Skills</h3>
          </div>
          <div id="lista-habilidades" class="skills-admin-grid"></div>
        </div>
      </div>
    </section>

    <section id="tab-contacto" class="tab-content">
      <div class="admin-card max-w-600">
        <div class="card-header">
          <h3><i class="fas fa-envelope-open-text"></i> Información de Contacto</h3>
        </div>
        <form id="form-contacto">
          <div class="input-group">
            <label>Email Público</label>
            <input type="email" id="c-email" placeholder="tu-correo@gmail.com">
          </div>
          <div class="input-group">
            <label>LinkedIn (URL)</label>
            <input type="text" id="c-linkedin" placeholder="https://linkedin.com/in/usuario">
          </div>
          <div class="input-group">
            <label>GitHub (URL)</label>
            <input type="text" id="c-github" placeholder="https://github.com/usuario">
          </div>
          <button type="submit" class="btn-primary">Actualizar Contacto</button>
        </form>
      </div>
    </section>

        <section id="tab-testimonios" class="tab-content">
            <div class="admin-grid">
                <div class="admin-card">
                    <div class="card-header">
                        <h3><i class="fas fa-plus-circle"></i> Nuevo Testimonio</h3>
                    </div>
                    <form id="form-testimonio">
                        <div class="input-group">
                            <input type="text" id="t-nombre" placeholder="Nombre de la persona" required>
                        </div>
                        <div class="input-group">
                            <textarea id="t-texto" placeholder="Texto del testimonio" rows="4" required></textarea>
                        </div>
                        <div class="input-group">
                            <input type="text" id="t-rol" placeholder="Rol o cargo (Ej: Compañera de trabajo)">
                        </div>
                        <div class="input-group">
                            <label for="t-avatar">Foto (opcional)</label>
                            <input type="file" id="t-avatar" class="file-input">
                        </div>
                        <button type="submit" class="btn-primary w-100">Añadir Testimonio</button>
                    </form>
                </div>

                <div class="admin-card">
                    <div class="card-header">
                        <h3><i class="fas fa-list"></i> Testimonios</h3>
                    </div>
                    <div id="lista-testimonios" class="admin-list-container"></div>
                </div>
            </div>
        </section>

        <section id="tab-sobre" class="tab-content">
      <div class="admin-card max-w-800">
        <div class="card-header">
          <h3><i class="fas fa-id-card"></i> Editar Perfil</h3>
        </div>
        <form id="form-sobre">
          <div class="input-group">
            <label>Título Profesional</label>
            <input type="text" id="about-titulo-input" placeholder="Ej: Desarrolladora de Software">
          </div>
          <div class="input-group">
            <label>Descripción Principal</label>
            <textarea id="about-desc1-input" rows="4"></textarea>
          </div>
          <div class="input-group">
            <label>Descripción Secundaria</label>
            <textarea id="about-desc2-input" rows="3"></textarea>
          </div>
          <div class="input-group">
            <label>Foto de Perfil</label>
            <input type="file" id="about-img-file">
          </div>
          <div class="input-group">
            <label>Palabras Clave (separadas por coma)</label>
            <input type="text" id="about-lista-input">
          </div>
          <button type="submit" class="btn-primary">Guardar Perfil</button>
        </form>
      </div>
    </section>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
